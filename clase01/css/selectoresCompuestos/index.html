<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <!-- combinadores descendiente-->
    <div>
      <h2>titulo principal</h2>
    </div>

    <div class="contenedor">
      <h2>sub titulo de contenedor</h2>
      <div>
        <p>soy un parrafo</p>
      </div>
    </div>
    <hr />

    <!-- combinador de hijo -->
    <div class="caja">
      <h2>sub titulo de caja</h2>
      <p>soy un parrafo de caja</p>
      <div>
        <p>soy el nieto de caja</p>
      </div>
    </div>
    <hr />

    <!-- combinador de hermano adyacente -->
    <h3>sub titulo de hermano adyacente</h3>
    <p>soy un parrafo de hermano adayacente</p>
    <p>soy el segundo parrafo</p>
  </body>
</html>
